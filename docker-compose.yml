version: "3.9"

services:
  mongo:
    image: mongo:7-jammy
    container_name: devlens-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: devlens
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devlens-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devlens-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/devlens
    volumes:
      - repo_cache:/tmp/repos
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - devlens-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devlens-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - devlens-net

volumes:
  mongo_data:
  repo_cache:

networks:
  devlens-net:
    driver: bridge
